<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - MonApp</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tableau de bord</h1>
            <div class="user-info">
                <span id="user-email"></span>
                <button id="logout-btn" class="btn-secondary">Déconnexion</button>
            </div>
        </header>

        <main>
            <section class="dashboard-section">
                <h2>Bienvenue <span id="user-name"></span> !</h2>
                <p>Ceci est votre tableau de bord personnel.</p>
                
                <div class="stats">
                    <div class="card">
                        <h3>Statistiques</h3>
                        <p>Contenu personnalisé ici...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
