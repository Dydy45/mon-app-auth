<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MonApp</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Bienvenue sur MonApp</h1>
            <p class="subtitle">Connectez-vous ou créez un compte</p>
        </header>

        <main>
            <div class="auth-container">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="login">Connexion</button>
                    <button class="tab-btn" data-tab="register">Inscription</button>
                </div>

                <form id="login-form" class="auth-form active">
                    <h2>Connexion</h2>
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Mot de passe</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-me">
                        <span>Se souvenir de moi</span>
                    </label>
                    <button type="submit" class="btn-primary">Se connecter</button>
                    <a href="reset-password.html" class="forgot-link">Mot de passe oublié ?</a>
                </form>

                <form id="register-form" class="auth-form">
                    <h2>Inscription</h2>
                    <div class="form-group">
                        <label for="register-name">Nom complet</label>
                        <input type="text" id="register-name" required>
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Mot de passe</label>
                        <input type="password" id="register-password" minlength="6" required>
                    </div>
                    <button type="submit" class="btn-primary">S'inscrire</button>
                </form>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
